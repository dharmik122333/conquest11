<!DOCTYPE html>
<html>
<head>
<title>IoT Security Dashboard</title>

<style>
body {
    background: #0d1117;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 { margin-top: 20px; }

#status {
    font-size: 20px;
    margin: 15px;
}

table {
    width: 80%;
    margin: auto;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
}

th {
    background: #161b22;
}

tr:nth-child(even) {
    background: #161b22;
}

.low { color: lime; }
.medium { color: orange; }
.high { color: red; }
</style>
</head>

<body>

<h1>🔐 IoT Security Dashboard</h1>
<div id="status">Loading...</div>

<table>
<thead>
<tr>
<th>IP Address</th>
<th>Packets</th>
<th>Threat</th>
</tr>
</thead>

<tbody id="data-table"></tbody>
</table>

<script>
// 🔥 Generate fake live data
function generateData() {
    const devices = [
        "192.168.1.2",
        "192.168.1.5",
        "192.168.1.10",
        "192.168.1.20"
    ];

    return devices.map(ip => {
        const packets = Math.floor(Math.random() * 800);

        let threat = "LOW";
        if (packets > 500) threat = "HIGH";
        else if (packets > 200) threat = "MEDIUM";

        return { ip, packets, threat };
    });
}

// 🔥 Load data into table
function loadData() {
    const data = generateData();

    const table = document.getElementById("data-table");
    table.innerHTML = "";

    let high = false;

    data.forEach(device => {
        const row = `
        <tr>
            <td>${device.ip}</td>
            <td>${device.packets}</td>
            <td class="${device.threat.toLowerCase()}">${device.threat}</td>
        </tr>`;
        table.innerHTML += row;

        if (device.threat === "HIGH") high = true;
    });

    const status = document.getElementById("status");

    if (high) {
        status.innerHTML = "🚨 System Status: UNDER THREAT";
        status.style.color = "red";
    } else {
        status.innerHTML = "✅ System Status: SECURE";
        status.style.color = "lime";
    }
}

// 🔄 Auto refresh every 2 seconds
setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
